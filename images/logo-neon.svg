<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Multi-layer neon glow filter - clean white glow like reference -->
    <filter id="neonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <!-- Outer soft glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <!-- Middle glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <!-- Inner bright glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur3"/>
      <!-- Combine all layers -->
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- IEC Logo - two arrows pointing up, meeting at center -->
  <g filter="url(#neonGlow)" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left arrow pointing up-left -->
    <path d="M 30,150 L 30,80 L 70,40 L 100,70 L 70,100 L 70,150 Z"/>
    <!-- Right arrow pointing up-right (mirrored) -->
    <path d="M 170,150 L 170,80 L 130,40 L 100,70 L 130,100 L 130,150 Z"/>
  </g>
</svg>
