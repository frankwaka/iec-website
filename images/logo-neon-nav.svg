<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Subtle neon glow filter for navbar -->
    <filter id="neonGlowNav" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- IEC Logo - two arrows pointing up, meeting at center -->
  <g filter="url(#neonGlowNav)" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left arrow pointing up-left -->
    <path d="M 15,75 L 15,40 L 35,20 L 50,35 L 35,50 L 35,75 Z"/>
    <!-- Right arrow pointing up-right (mirrored) -->
    <path d="M 85,75 L 85,40 L 65,20 L 50,35 L 65,50 L 65,75 Z"/>
  </g>
</svg>
